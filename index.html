<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Mineria de Datos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Mono:wght@400;500;700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --sat-black: #010203;
            --sat-dark-blue: #040a0f;
            --mw-white: #ffffff;
            --mw-cyan: #06b6d4;
            --mw-cyan-dim: rgba(6, 182, 212, 0.3);
            --mw-gray: #64748b;
            --mw-red: #ef4444;
            --mw-green: #22c55e;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box; user-select: none; cursor: crosshair !important;
        }

        body {
            background-color: var(--sat-black);
            color: var(--mw-white);
            font-family: 'Roboto Mono', monospace;
            overflow: hidden; width: 100vw; height: 100vh;
        }

        /* --- SATELLITE ENGINE BACKGROUND --- */
        .sat-engine {
            position: absolute; top: -20%; left: -20%; width: 140%; height: 140%;
            background-color: var(--sat-dark-blue);
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 10%, #000 85%),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.003" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.2"/></svg>');
            mix-blend-mode: screen; z-index: 1; transform: scale(1.5); opacity: 0;
            filter: grayscale(0.9) contrast(2) brightness(0.6) sepia(0.2) hue-rotate(180deg);
            transition: transform 12s cubic-bezier(0.1, 1, 0.1, 1), opacity 2s;
        }

        .sat-engine.active {
            opacity: 1; transform: scale(1);
            animation: slowDrift 60s linear infinite alternate 10s, cameraJolt 20s infinite;
        }

        @keyframes slowDrift { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.1) translate(-2%, -2%); } }
        @keyframes cameraJolt {
            0%, 98%, 100% { filter: grayscale(0.9) contrast(2) brightness(0.6) sepia(0.2) hue-rotate(180deg); transform: scale(1.05); }
            99% { filter: grayscale(1) contrast(3) brightness(0.8) sepia(0) hue-rotate(180deg); transform: scale(1.06); }
        }

        /* Tactical Grid */
        .map-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 8vw 8vw; z-index: 2; opacity: 0; transition: opacity 3s 1s;
        }
        .map-grid.active { opacity: 1; }

        /* Drone Compass/Crosshair */
        .drone-crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50vw; height: 50vw; border: 1px solid var(--mw-cyan-dim); border-radius: 50%;
            z-index: 3; opacity: 0; animation: fadeIn 3s 2s forwards, slowRotate 150s linear infinite;
        }
        .drone-crosshair::before, .drone-crosshair::after { content: ''; position: absolute; background: var(--mw-cyan-dim); }
        .drone-crosshair::before { top: 50%; left: -50px; right: -50px; height: 1px; }
        .drone-crosshair::after { left: 50%; top: -50px; bottom: -50px; width: 1px; }

        @keyframes slowRotate { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Scanlines & Vignette */
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px); z-index: 998; pointer-events: none; }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.98) 100%); z-index: 997; pointer-events: none; }

        /* Interference */
        .interference { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 999; pointer-events: none; opacity: 0; }
        @keyframes randomGlitch { 0%, 96%, 100% { opacity: 0; transform: translateY(0); } 97% { opacity: 1; transform: translateY(-5px); background: rgba(255,255,255,0.05); } 98% { opacity: 0; transform: translateY(5px); } }
        .interference.active { animation: randomGlitch 6s infinite; }

        /* Lens Flare */
        .lens-flare { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0); transform: translateY(-50%); z-index: 900; pointer-events: none; }
        .lens-flare.flash { animation: flashFlare 1.2s cubic-bezier(0.1, 1, 0.1, 1) forwards; }
        @keyframes flashFlare {
            0% { background: rgba(255,255,255,1); box-shadow: 0 0 100px 50px #fff, 0 0 200px 100px var(--mw-cyan); height: 2px; }
            50% { background: rgba(255,255,255,0.5); box-shadow: 0 0 50px 20px #fff; height: 1px; }
            100% { background: rgba(255,255,255,0); box-shadow: 0 0 0px #fff; height: 0px; }
        }

        /* Top Bar Status */
        .top-status {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 0.8rem; color: var(--mw-cyan); letter-spacing: 5px; z-index: 990; opacity: 0;
        }

        /* Corner HUDs */
        .hud-data { position: absolute; font-size: 0.85rem; color: var(--mw-gray); z-index: 990; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; opacity: 0; transition: opacity 0.5s; }
        .hud-data.active { opacity: 1; }
        .tl { top: 40px; left: 50px; border-left: 2px solid var(--mw-gray); padding-left: 10px; }
        .tr { top: 40px; right: 50px; text-align: right; }
        .bl { bottom: 40px; left: 50px; }
        .br { bottom: 40px; right: 50px; text-align: right; border-right: 2px solid var(--mw-gray); padding-right: 10px; }
        .rec-box { display: flex; align-items: center; justify-content: flex-end; gap: 8px; color: var(--mw-white); font-weight: 700; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; }
        .rec-dot { width: 10px; height: 10px; background: var(--mw-red); border-radius: 50%; box-shadow: 0 0 10px var(--mw-red); animation: blink 1s infinite; }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* Main Briefing */
        .briefing-center { position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .horizontal-strike { width: 0%; height: 1px; background: var(--mw-white); margin: 5px 0; transition: width 0.4s cubic-bezier(0.7, 0, 0.3, 1); position: relative; }
        .horizontal-strike.expand { width: 100%; }
        .mission-title-container { position: relative; display: flex; justify-content: center; width: 100%; height: 14vw; align-items: center; }
        .mission-title { position: absolute; font-family: 'Bebas Neue', sans-serif; font-size: 12vw; color: var(--mw-white); letter-spacing: 0.4vw; line-height: 1; opacity: 0; transform: scale(1.1); filter: blur(20px); }
        .mission-title.reveal { animation: textImpact 1.2s cubic-bezier(0.1, 1, 0.1, 1) forwards; }
        @keyframes textImpact {
            0% { opacity: 0; transform: scale(1.2); filter: blur(20px); }
            10% { opacity: 1; transform: scale(1.02); filter: blur(0px); text-shadow: 15px 0 var(--mw-red), -15px 0 var(--mw-cyan); }
            20% { transform: scale(1); text-shadow: 5px 0 var(--mw-red), -5px 0 var(--mw-cyan); }
            40% { text-shadow: 0 0 30px rgba(255,255,255,0.3); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        }
        .sub-details { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 600; color: var(--mw-cyan); letter-spacing: 6px; margin-top: 15px; text-align: center; display: flex; flex-direction: column; gap: 5px; text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }

        /* Operators */
        .ops-container { position: absolute; bottom: 12vh; width: 100%; display: flex; justify-content: center; gap: 4vw; z-index: 50; }
        .op-card { display: flex; flex-direction: column; border-left: 2px solid var(--mw-cyan-dim); padding-left: 15px; width: 280px; position: relative; opacity: 0; transition: opacity 0.5s; }
        .op-card.active { opacity: 1; }
        .op-card::before { content: ''; position: absolute; top:0; left:-2px; width:2px; height:30%; background: var(--mw-cyan); }
        .op-role { font-family: 'Roboto Mono', monospace; font-size: 0.75rem; color: var(--mw-gray); letter-spacing: 3px; margin-bottom: 2px; }
        .op-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--mw-white); letter-spacing: 3px; line-height: 1; text-shadow: 0 0 15px rgba(255,255,255,0.1); }

        /* COMMAND CONSOLE BAR */
        .command-console {
            position: absolute; bottom: -100px; left: 0; width: 100%; height: 80px;
            background: rgba(2, 6, 12, 0.9); border-top: 2px solid var(--mw-cyan);
            display: flex; align-items: center; justify-content: space-between; padding: 0 5vw;
            z-index: 1000; transition: bottom 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            backdrop-filter: blur(10px); box-shadow: 0 -10px 40px rgba(6, 182, 212, 0.15);
        }
        .command-console.active { bottom: 0; }

        .console-info { display: flex; flex-direction: column; gap: 2px; }
        .console-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--mw-white); letter-spacing: 4px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .console-sub { font-family: 'Roboto Mono', monospace; font-size: 0.85rem; color: var(--mw-cyan); letter-spacing: 3px; }

        .console-actions { display: flex; gap: 20px; }

        .cmd-btn {
            background: transparent; border: 1px solid rgba(6, 182, 212, 0.4);
            color: var(--mw-cyan); font-family: 'Roboto Mono', monospace; font-size: 1rem; font-weight: 500;
            padding: 12px 30px; letter-spacing: 3px; cursor: pointer; transition: all 0.3s;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; position: relative; overflow: hidden;
        }
        .cmd-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.3), transparent);
            transition: left 0.5s;
        }
        .cmd-btn:hover::before { left: 100%; }
        .cmd-btn:hover {
            background: var(--mw-cyan); color: #000; box-shadow: 0 0 25px rgba(6, 182, 212, 0.6);
            font-weight: bold; border-color: var(--mw-cyan); transform: translateY(-2px);
        }
        .cmd-btn.primary { background: rgba(6, 182, 212, 0.1); border-color: var(--mw-cyan); animation: pulseBtn 2s infinite; }
        @keyframes pulseBtn { 0%,100% { box-shadow: 0 0 0px transparent; } 50% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); } }

        /* PRE-CLICK AUTHENTICATION TERMINAL (CLIENT READY) */
        #preClickOverlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at center, #050a0f 0%, #000 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .auth-terminal {
            position: relative; padding: 60px 100px; background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; overflow: hidden; display: flex; flex-direction: column; gap: 20px; align-items: center; width: 600px;
        }
        .auth-terminal::before, .auth-terminal::after { content: ''; position: absolute; width: 40px; height: 40px; border: 2px solid var(--mw-cyan); transition: all 0.3s; }
        .auth-terminal::before { top: 0; left: 0; border-right: none; border-bottom: none; }
        .auth-terminal::after { bottom: 0; right: 0; border-left: none; border-top: none; }
        .auth-terminal.success { border-color: var(--mw-green); }
        .auth-terminal.success::before, .auth-terminal.success::after { border-color: var(--mw-green); }

        .auth-logo { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: var(--mw-white); letter-spacing: 10px; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .auth-sub { font-size: 0.9rem; color: var(--mw-gray); letter-spacing: 4px; height: 1.5rem; }
        
        .auth-console-lines {
            font-size: 0.8rem; color: var(--mw-gray); text-align: left; width: 100%; margin-top: 10px; min-height: 60px; font-family: 'Roboto Mono', monospace;
        }
        .console-line { margin-bottom: 5px; opacity: 0; }
        .console-line.success { color: var(--mw-green); font-weight: bold; }

        .btn-auth {
            background: transparent; border: 1px solid var(--mw-cyan); color: var(--mw-cyan); padding: 15px 50px; font-family: 'Roboto Mono', monospace; font-size: 1.1rem; letter-spacing: 4px; transition: all 0.3s; margin-top: 10px; font-weight: 500;
        }
        .btn-auth:hover { background: var(--mw-cyan); color: #000; box-shadow: 0 0 30px rgba(6, 182, 212, 0.5); transform: scale(1.02); }

        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(6, 182, 212, 0.6); box-shadow: 0 0 15px var(--mw-cyan); animation: terminalScan 3s linear infinite; }
        .auth-terminal.success .scan-line { background: var(--mw-green); box-shadow: 0 0 15px var(--mw-green); }

        @keyframes terminalScan { 0% { top: -10%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 110%; opacity: 0; } }
        .blinking-cursor::after { content: '█'; animation: blink 1s infinite; margin-left: 8px; color: var(--mw-white); }
        .mw-text { display: inline-block; white-space: pre; }

        @media (max-width: 1024px) {
            .op-card { width: 200px; }
            .op-name { font-size: 2rem; }
            .mission-title { font-size: 10vw; }
            .command-console { padding: 0 3vw; }
            .console-title { font-size: 1.4rem; }
            .auth-terminal { width: 90%; padding: 40px 30px; }
            .hud-data { font-size: 0.7rem; }
            .hud-data.tl { left: 20px; }
            .hud-data.bl { left: 20px; }
            .hud-data.tr { right: 20px; }
            .hud-data.br { right: 20px; }
        }
        @media (max-width: 768px) {
            .ops-container { flex-wrap: wrap; gap: 15px; bottom: 15vh; padding: 0 20px; }
            .op-card { width: 45%; padding-left: 10px; }
            .op-name { font-size: 1.6rem; }
            .mission-title-container { height: 20vw; }
            .mission-title { font-size: 8vw; }
            .sub-details { font-size: 1.2rem; letter-spacing: 3px; }
            .command-console { flex-direction: column; height: auto; padding: 15px 20px; gap: 10px; }
            .console-info { text-align: center; }
            .console-title { font-size: 1.2rem; }
            .console-actions { gap: 10px; flex-wrap: wrap; justify-content: center; }
            .cmd-btn { padding: 10px 20px; font-size: 0.85rem; }
            .header-title { font-size: 1.8rem; letter-spacing: 4px; }
            header { padding: 0 20px; }
            .top-status { font-size: 0.65rem; letter-spacing: 3px; }
            .hud-data { display: none; }
            .auth-terminal { padding: 30px 20px; }
            .auth-logo { font-size: 2.5rem; letter-spacing: 5px; }
            .btn-auth { padding: 12px 30px; font-size: 0.9rem; }
            .drone-crosshair { width: 80vw; height: 80vw; }
        }
        @media (max-width: 480px) {
            .ops-container { bottom: 18vh; gap: 10px; }
            .op-card { width: 100%; }
            .op-role { font-size: 0.65rem; }
            .op-name { font-size: 1.4rem; }
            .mission-title { font-size: 10vw; letter-spacing: 0; }
            .sub-details { font-size: 1rem; }
            .command-console { padding: 12px 15px; }
            .console-title { font-size: 1rem; }
            .console-sub { font-size: 0.7rem; }
            .auth-logo { font-size: 1.8rem; }
            .auth-sub { font-size: 0.75rem; }
            header { flex-wrap: wrap; height: auto; padding: 10px 15px; gap: 5px; }
            .header-title { font-size: 1.3rem; }
            .header-status { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- AUDIO SCRIPT -->
    <audio id="mwTheme" src="mw.mp3" preload="auto" loop></audio>

    <!-- CLIENT READY BOOT TERMINAL -->
    <div id="preClickOverlay">
        <div class="auth-terminal" id="authBox">
            <div class="scan-line"></div>
            <div class="auth-logo">JSOC SECURE UPLINK</div>

            <div class="auth-console-lines" id="consoleLines">
                <!-- Lines injected by JS -->
            </div>

            <button class="btn-auth" id="btnInitUplink">AUTHORIZE CONNECTION</button>
        </div>
    </div>

    <!-- BACKGROUND EFFECTS -->
    <div class="sat-engine" id="satEngine"></div>
    <div class="map-grid" id="mapGrid"></div>
    <div class="drone-crosshair" id="crosshair"></div>
    <div class="interference" id="interference"></div>
    <div class="lens-flare" id="lensFlare"></div>
    <div class="scanlines"></div>

    <div class="top-status" id="topStatus">SATCOM SYSTEM: ONLINE</div>

    <!-- CORNER HUD -->

    </div>

        <div class="mw-text" data-text="LNG: 118.2437 W"></div>

    <div class="hud-data br">
        <div class="mw-text" data-text="TARGET: EVALUATION ET"></div><br>

    </div>

    <!-- MAIN BRIEFING -->
    <div class="briefing-center">
        <div class="horizontal-strike" id="hLine1"></div>
        
        <div class="mission-title-container">
            <div class="mission-title" id="missionLoc">ET MINERIA DE DATOS</div>
        </div>

        <div class="horizontal-strike" id="hLine2"></div>

        <div class="sub-details">
            <div class="mw-text" data-text="DAY 3 - 0100 HRS" id="sub1"></div>
            <div class="mw-text" data-text="OPERATION: VIDEOJUEGO ONLINE" style="font-family:'Roboto Mono', monospace; font-size:1.1rem; color:var(--mw-gray); font-weight:400;" id="sub2"></div>

    <!-- COMMAND CONSOLE -->
    <div class="command-console" id="actionContainer">

            <div class="console-title">MINERIA DE DATOS // UPLINK READY</div>
            <div class="console-sub blinking-cursor">AWAITING COMMANDER DECISION</div>
        </div>
        <div class="console-actions">
            <a href="inicio.html" class="cmd-btn" target="_blank">[ MISSION BRIEF ]</a>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const themeAudio = document.getElementById('mwTheme');

        // AUDIO ENGINE
        function playTypeClick() {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(3500 + Math.random()*1500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.015);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.015);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.015);
        }

        function playDroneHum() {
            if(audioCtx.state === 'suspended') return;
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer; noise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 150;
            const gain = audioCtx.createGain(); gain.gain.value = 0.05;
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function playHeavyThud() {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(50, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(5, audioCtx.currentTime + 1.5);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = noiseBuffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass'; noiseFilter.frequency.setValueAtTime(1000, audioCtx.currentTime); noiseFilter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.5, audioCtx.currentTime); noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            osc.connect(gain); gain.connect(audioCtx.destination);
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1.5); noise.start();
        }

        function playSuccessBeep() {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        class MilitaryDecoder {
            constructor(el) {
                this.el = el;
                this.targetText = el.getAttribute('data-text');
                this.hexChars = '0123456789ABCDEF!@#%*';
                this.el.innerHTML = '';
            }
            async decode(speed = 30) {
                return new Promise(resolve => {
                    let currentLength = 0;
                    const interval = setInterval(() => {
                        if (Math.random() > 0.2) currentLength++;
                        if (currentLength >= this.targetText.length) {
                            clearInterval(interval);
                            this.el.innerHTML = this.targetText;
                            resolve(); return;
                        }
                        let displayStr = this.targetText.substring(0, currentLength);
                        let scrambleLength = Math.floor(Math.random() * 2) + 1;
                        let scrambleStr = '';
                        for(let i=0; i<scrambleLength; i++) scrambleStr += this.hexChars[Math.floor(Math.random() * this.hexChars.length)];
                        this.el.innerHTML = displayStr + `<span style="color:var(--mw-cyan)">${scrambleStr}</span>` + '<span style="color:var(--mw-white)">█</span>';
                        playTypeClick();
                    }, speed);
                });
            }
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // MAIN SEQUENCE
        const btnInitUplink = document.getElementById('btnInitUplink');
        const preClickContainer = document.getElementById('preClickOverlay');
        const authBox = document.getElementById('authBox');
        const consoleLines = document.getElementById('consoleLines');
        const authSubtitle = document.getElementById('authSubtitle');

        btnInitUplink.addEventListener('click', async () => {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            // TERMINAL HANDSHAKE SEQUENCE (Client Wow-Factor)
            btnInitUplink.style.display = 'none';
            authSubtitle.classList.remove('blinking-cursor');
            authSubtitle.innerText = 'HANDSHAKE INITIATED';

            const addLine = (text, isSuccess = false) => {
                const el = document.createElement('div');
                el.className = 'console-line ' + (isSuccess ? 'success' : '');
                el.innerText = text;
                consoleLines.appendChild(el);
                setTimeout(() => el.style.opacity = 1, 10);
                playTypeClick();
            };

            addLine('> Requesting remote server access...');
            await sleep(800);
            addLine('> Decrypting payload headers... OK');
            await sleep(600);
            addLine('> Bypassing proxy firewall... OK');
            await sleep(800);
            
            authBox.classList.add('success');
            addLine('> ACCESS GRANTED. WELCOME, COMMANDER.', true);
            playSuccessBeep();

            await sleep(1000);

            // START BGM AND ENTER MW ENGINE
            preClickContainer.style.opacity = 0;
            setTimeout(() => preClickContainer.remove(), 500);

            themeAudio.volume = 0.8;
            themeAudio.play().catch(e => console.log('Audio error:', e));
            playDroneHum(); 

            document.getElementById('satEngine').classList.add('active');
            document.getElementById('mapGrid').classList.add('active');
            document.getElementById('interference').classList.add('active');
            
            setTimeout(() => {
                document.getElementById('topStatus').style.opacity = 1;
            }, 1000);

            await sleep(1500);

            // Lines snap
            document.getElementById('hLine1').classList.add('expand');
            document.getElementById('hLine2').classList.add('expand');

            await sleep(400);

            // Corners
            const corners = document.querySelectorAll('.hud-data');
            corners.forEach(el => el.classList.add('active'));
            const texts = document.querySelectorAll('.hud-data .mw-text');
            texts.forEach(el => new MilitaryDecoder(el).decode(15));

            await sleep(800);

            // LENS FLARE + THUD + TITLE
            document.getElementById('lensFlare').classList.add('flash');
            document.getElementById('missionLoc').classList.add('reveal');
            playHeavyThud();

            await sleep(1200);

            // Sub details
            new MilitaryDecoder(document.getElementById('sub1')).decode(40);
            await sleep(300);
            new MilitaryDecoder(document.getElementById('sub2')).decode(20);

            await sleep(1000);

            // Operators (Staggered perfectly)
            const cards = document.querySelectorAll('.op-card');
            for(let i=0; i<cards.length; i++){
                cards[i].classList.add('active');
                new MilitaryDecoder(cards[i].querySelector('.op-name')).decode(35);
                await sleep(500); 
            }

            await sleep(1200);

            // Deploy buttons
            document.getElementById('actionContainer').classList.add('active');
        });

        // DEPLOY TO SWAGGER
        document.getElementById('btnDeploy').addEventListener('click', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnDeploy');
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0';
            
            playHeavyThud();
            
            let vol = themeAudio.volume;
            const fade = setInterval(() => {
                vol -= 0.05;
                if(vol <= 0) { clearInterval(fade); themeAudio.pause(); } 
                else { themeAudio.volume = vol; }
            }, 50);

            const blackout = document.createElement('div');
            blackout.style.position = 'fixed'; blackout.style.top = '0'; blackout.style.left = '0';
            blackout.style.width = '100vw'; blackout.style.height = '100vh'; blackout.style.background = 'rgba(0,0,0,0.9)';
            blackout.style.zIndex = '999999'; blackout.style.opacity = '0'; blackout.style.transition = 'opacity 0.2s';
            blackout.style.display = 'flex'; blackout.style.alignItems = 'center'; blackout.style.justifyContent = 'center';
            document.body.appendChild(blackout);

            setTimeout(() => { blackout.style.opacity = '1'; }, 50);

            // Terminal Transition Box
            const term = document.createElement('div');
            term.style.fontFamily = "'Roboto Mono', monospace";
            term.style.color = "var(--mw-cyan)";
            term.style.fontSize = "1.1rem";
            term.style.textAlign = "left";
            term.style.width = "600px";
            term.style.textShadow = "0 0 10px rgba(6, 182, 212, 0.5)";
            blackout.appendChild(term);

            const addDeployLine = async (text, waitTime) => {
                const line = document.createElement('div');
                line.style.marginBottom = '10px';
                term.appendChild(line);
                let txt = '';
                for(let i=0; i<text.length; i++) {
                    txt += text[i];
                    line.innerHTML = txt + '<span style="color:var(--mw-white)">█</span>';
                    playTypeClick();
                    await sleep(15);
                }
                line.innerText = text;
                await sleep(waitTime);
            };

            await sleep(600);
            await addDeployLine('> INITIALIZING VIDEO SEQUENCE...', 500);
            await addDeployLine('> LOADING DATA MINING DEMO... OK', 400);
            await addDeployLine('> PREPARING MODEL VISUALIZATION... OK', 400);
            await addDeployLine('> STAND BY FOR PLAYBACK.', 800);

            // Final Cut to Black
            blackout.style.background = '#000';
            term.style.display = 'none';
            playHeavyThud();

            setTimeout(() => { window.location.href = 'video.html'; }, 700);
        });

        // MOUSE PARALLAX - DRONE SWAY
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            document.getElementById('satEngine').style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
            document.getElementById('crosshair').style.transform = `translate(calc(-50% + ${x*0.5}px), calc(-50% + ${y*0.5}px))`;
        });

    </script>
</body>
</html>
